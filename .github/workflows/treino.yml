name: Fine-Tuning Diario da IA

on:
  schedule:
    # Roda todos os dias à meia-noite (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite rodar manualmente clicando num botão no GitHub

permissions:
  contents: write

jobs:
  treinar-ia:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o repositório
      uses: actions/checkout@v3

    - name: Instalar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Bibliotecas
      run: |
        python -m pip install --upgrade pip
        pip install torch yfinance pandas numpy

    - name: Rodar o Treino Diário (MLOps)
      run: python treino_diario.py

    - name: Salvar e Enviar o Novo Cérebro para o GitHub
      run: |
        git config --global user.name 'Emergent AI Bot'
        git config --global user.email 'bot@vgbtech.com'
        git add emergent_brain.pth
        git commit -m "🧠 [Auto] Fine-Tuning diário concluído" || echo "Sem mudanças hoje"
        git push
